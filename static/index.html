<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>写作</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 登录 -->
  <div id="login" class="screen">
    <h1>✍ 写作</h1>
    <div id="loginForm">
      <input id="user" placeholder="用户名" onkeydown="if(event.key==='Enter')doLogin()">
      <input id="pwd" type="password" placeholder="密码" onkeydown="if(event.key==='Enter')doLogin()">
      <button onclick="doLogin()">登录</button>
      <a id="toRegister" href="#" class="link hidden" onclick="showRegister();return false">注册账号</a>
    </div>
    <div id="registerForm" class="hidden">
      <input id="regUser" placeholder="用户名（≥2位）">
      <input id="regPwd" type="password" placeholder="密码（≥4位）">
      <input id="regCode" placeholder="注册码">
      <button onclick="doRegister()">注册并登录</button>
      <a href="#" class="link" onclick="showLogin();return false">返回登录</a>
    </div>
    <p id="loginMsg" class="msg"></p>
  </div>

  <!-- 主界面 -->
  <div id="app" class="hidden">
    <aside id="sidebar" class="sidebar">
      <div class="side-head">
        <span id="meName">目录</span>
        <button class="ic" onclick="newWork()" title="新建作品">＋作品</button>
      </div>
      <div id="workTree" class="tree"></div>
    </aside>

    <main class="main">
      <header class="topbar">
        <button class="ic" onclick="toggleSidebar()" title="目录">☰</button>
        <input id="chapTitle" class="title-input" placeholder="章节标题">
        <span id="wc" class="wc">0 字</span>
        <span id="saveStat" class="save-stat"></span>
        <select id="exportSel" class="ic" onchange="exportChap(this.value);this.selectedIndex=0" title="导出">
          <option value="">⬇导出</option>
          <option value="txt">本章TXT</option>
          <option value="docx">本章DOCX</option>
          <option value="work-txt">整本TXT</option>
          <option value="work-docx">整本DOCX</option>
        </select>
        <button class="ic" onclick="saveRevision()" title="存为版本">🗂存版</button>
        <button class="ic" onclick="showRevisions()" title="历史版本">🕘历史</button>
        <button class="ic" onclick="openTrash()" title="回收站">🗑回收</button>
        <button class="ic" onclick="openAITools()" title="AI 写作工具（校验/摘要）">✦AI</button>
        <button class="ic" onclick="openChat()" title="和 AI 探讨剧情">💬</button>
        <button class="ic" onclick="openWiki()" title="实体卡片（人物/地点…）">👥实体</button>
        <button class="ic" onclick="toggleFocus()" title="专注">⊚</button>
        <button class="ic" onclick="toggleRead()" title="阅读">📖</button>
        <button class="ic" onclick="openSettings()" title="大模型设置">⚙</button>
        <button class="ic" onclick="doLogout()" title="退出">⏻</button>
      </header>

      <div class="modes">
        <button class="mode active" data-mode="转写" onclick="setMode('转写')">转写</button>
        <button class="mode" data-mode="润色" onclick="setMode('润色')">润色</button>
        <button class="mode" data-mode="扩写" onclick="setMode('扩写')">扩写</button>
        <button class="mode" data-mode="续写" onclick="setMode('续写')">续写</button>
        <button id="genBtn" class="gen hidden" onclick="generate()">⏎ 生成</button>
      </div>

      <div class="micbar">
        <button id="micBtn" class="mic" onclick="toggleMic()">🎤 开始说</button>
        <span id="micStatus" class="status"></span>
        <button class="ic" onclick="undo()" title="撤销最近一段">↩撤销</button>
        <button class="ic" onclick="toggleFind()" title="查找替换">🔍找</button>
        <button class="ic" onclick="splitChapter()" title="在光标处拆分章节">✂拆分</button>
        <button class="ic" onclick="toggleNotes()" title="本章备注">📝备注</button>
        <span class="vbar"></span>
        <button class="ic" onclick="processSelection('缩写')" title="把选中的段落缩到约一半">↧缩写选区</button>
        <select id="rwStyle" class="ic" title="改写风格">
          <option>更生动</option><option>更精炼</option><option>文艺风</option><option>口语化</option><option>悬疑感</option>
        </select>
        <button class="ic" onclick="processSelection('改写', $('rwStyle').value)" title="把选中的段落换成上面的风格">✎改写选区</button>
      </div>

      <div id="findBar" class="findbar hidden">
        <input id="findInput" placeholder="查找…" oninput="doFind()">
        <button class="ic" onclick="findNext()">下一个</button>
        <input id="replaceInput" placeholder="替换为…">
        <button class="ic" onclick="doReplace()">替换</button>
        <button class="ic" onclick="replaceAll()">全部</button>
        <span id="findInfo" class="find-info"></span>
        <button class="ic" onclick="toggleFind()">✕</button>
      </div>

      <div id="notesBar" class="notesbar hidden">
        <textarea id="notes" placeholder="本章备注/梗概/设定（会作为 AI 续写、扩写的上下文）"></textarea>
      </div>

      <div id="draft" class="draft">这里显示你正在说的话…</div>

      <textarea id="content" class="content" spellcheck="true" lang="zh-CN" placeholder="正文（手打或语音都行，自动保存）"></textarea>
    </main>
  </div>

  <!-- 阅读视图 -->
  <div id="reader" class="reader hidden">
    <div class="reader-top">
      <button onclick="toggleRead()">✕</button>
      <button onclick="readerPrev()">‹ 上章</button>
      <span id="readerTitle" class="r-title"></span>
      <button onclick="readerNext()">下章 ›</button>
      <span class="r-spacer"></span>
      <button class="ic" onclick="readerFont(-1)">A－</button>
      <button class="ic" onclick="readerFont(1)">A＋</button>
      <button class="ic" onclick="readerLine()">行距</button>
      <button class="ic" onclick="readerToggleTTS()" id="ttsBtn">▶朗读</button>
      <select id="readerJump" onchange="readerJumpTo()"></select>
    </div>
    <article id="readView" class="read-text"></article>
  </div>

  <!-- 历史版本 -->
  <div id="revOverlay" class="overlay hidden">
    <div class="overlay-card">
      <div class="overlay-head"><span>历史版本</span><button class="ic" onclick="closeRevisions()">✕</button></div>
      <div id="revList" class="rev-list"></div>
    </div>
  </div>

  <!-- 版本对比 -->
  <div id="diffOverlay" class="overlay hidden">
    <div class="overlay-card chat-card">
      <div class="overlay-head"><span>版本对比（历史 → 当前）</span><button class="ic" onclick="closeDiff()">✕</button></div>
      <div id="diffSub" class="set-hint" style="padding:8px 14px 0"></div>
      <div id="diffBody" class="diff-body"></div>
    </div>
  </div>

  <!-- 回收站 -->
  <div id="trashOverlay" class="overlay hidden">
    <div class="overlay-card">
      <div class="overlay-head"><span>回收站</span><button class="ic" onclick="closeTrash()">✕</button></div>
      <div id="trashList" class="rev-list"></div>
    </div>
  </div>

  <!-- 实体卡片 wiki -->
  <div id="wikiOverlay" class="overlay hidden">
    <div class="overlay-card chat-card">
      <div class="overlay-head"><span>实体卡片</span><button class="ic" onclick="closeWiki()">✕</button></div>
      <div class="set-form">
        <div id="wikiList" class="wiki-list"></div>
        <hr class="sep">
        <div class="wiki-edit">
          <input id="entName" placeholder="名称（如：林晚）">
          <select id="entKind" class="ic">
            <option>人物</option><option>地点</option><option>物品</option><option>组织</option><option>概念</option>
          </select>
          <input id="entSummary" placeholder="一句话摘要">
          <textarea id="entDetail" placeholder="详细设定（外貌/性格/关系/来历…）"></textarea>
          <div class="set-actions">
            <button id="entSaveBtn" onclick="saveEntity()">新增</button>
            <button id="entInsBtn" onclick="insertEntity()" title="在正文光标处插入 @名">插入到正文</button>
          </div>
          <span id="entMsg" class="msg"></span>
        </div>
      </div>
    </div>
  </div>

  <!-- @提及悬浮卡 -->
  <div id="mentionPop" class="mention-pop hidden"></div>

  <!-- 大模型设置 -->
  <div id="setOverlay" class="overlay hidden">
    <div class="overlay-card">
      <div class="overlay-head"><span>大模型设置</span><button class="ic" onclick="closeSettings()">✕</button></div>
      <div class="set-form">
        <p class="set-hint">填好你的 OpenAI 兼容接口，润色/扩写/续写才会生效。每人用自己的 key，互不影响。</p>
        <label>Base URL</label>
        <input id="setBaseUrl" placeholder="https://api.deepseek.com/v1">
        <label>API Key</label>
        <input id="setApiKey" type="password" placeholder="sk-…（已设置则显示 ****，留空=不改）">
        <label>模型 ID</label>
        <input id="setModel" placeholder="deepseek-chat">
        <div class="set-actions">
          <button onclick="saveSettings()">保存</button>
          <button class="ic" onclick="closeSettings()">取消</button>
        </div>
        <p id="setMsg" class="msg"></p>
      </div>
    </div>
  </div>

  <!-- 作品设定（人物/世界观/大纲，喂给 AI 当全文记忆） -->
  <div id="wnOverlay" class="overlay hidden">
    <div class="overlay-card">
      <div class="overlay-head"><span>作品设定</span><button class="ic" onclick="closeWorkNotes()">✕</button></div>
      <div class="set-form">
        <p class="set-hint">人物表 / 世界观 / 大纲。本作品下所有 AI（润色/扩写/续写/找回）都会读到它，保证全文一致。</p>
        <textarea id="wnText" rows="14" placeholder="主角：……&#10;世界观：……&#10;大纲：……"></textarea>
        <div class="set-actions">
          <button onclick="saveWorkNotes()">保存</button>
          <button class="ic" onclick="closeWorkNotes()">取消</button>
        </div>
        <p id="wnMsg" class="msg"></p>
      </div>
    </div>
  </div>

  <!-- AI 写作工具（校验/摘要，不污染正文） -->
  <div id="aiOverlay" class="overlay hidden">
    <div class="overlay-card">
      <div class="overlay-head"><span>AI 写作工具</span><button class="ic" onclick="closeAITools()">✕</button></div>
      <div class="set-form">
        <p class="set-hint">基于作品设定 + 本章正文。校验只列问题不改字；摘要会填进备注，成为后续 AI 上下文。</p>
        <div class="set-actions">
          <button onclick="aiCheck()">一致性校验</button>
          <button onclick="aiSynopsis()">生成本章摘要</button>
        </div>
        <pre id="aiResult" class="ai-result"></pre>
      </div>
    </div>
  </div>

  <!-- 与 AI 探讨剧情（不污染正文） -->
  <div id="chatOverlay" class="overlay hidden">
    <div class="overlay-card chat-card">
      <div class="overlay-head"><span>与 AI 探讨剧情</span><button class="ic" onclick="closeChat()">✕</button></div>
      <div id="chatMsgs" class="chat-msgs"></div>
      <div class="chat-input-row">
        <textarea id="chatInput" rows="2" placeholder="聊剧情走向、逻辑漏洞…（Enter 发送，Shift+Enter 换行）"
                  onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendChat()}"></textarea>
        <button onclick="sendChat()">发送</button>
        <button class="ic" onclick="clearChat()" title="清空对话">🗑</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
