<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>后台管理 · 写作</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body { background: var(--bg); color: var(--ink); margin: 0; }
    .adm { max-width: 980px; margin: 0 auto; padding: 20px 16px 60px; }
    .adm-head { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; }
    .adm-head h1 { font-size: 1.25rem; margin: 0; flex: 1; }
    .adm-head .ic { background: var(--panel); border: 1px solid var(--line); }
    .adm-card { background: var(--panel); border: 1px solid var(--line); border-radius: var(--r); padding: 14px 16px; margin-bottom: 18px; }
    .adm-card h2 { font-size: 1rem; margin: 0 0 10px; color: var(--accent-text); }
    table.adm-tbl { width: 100%; border-collapse: collapse; font-size: 13px; }
    table.adm-tbl th, table.adm-tbl td { padding: 7px 8px; text-align: left; border-bottom: 1px solid var(--line); vertical-align: middle; }
    table.adm-tbl th { color: var(--muted); font-weight: 600; white-space: nowrap; }
    table.adm-tbl tr:last-child td { border-bottom: none; }
    .tag { display: inline-block; padding: 1px 6px; border-radius: 999px; font-size: 11px; background: var(--side-bg); color: var(--muted); }
    .tag.on { background: var(--accent); color: var(--on-accent); }
    .tag.adm-tag { background: var(--accent-strong); color: var(--on-accent); }
    .del-btn { border: 1px solid var(--line); background: var(--panel); color: var(--danger); padding: 3px 10px; border-radius: var(--r-sm); cursor: pointer; font-size: 13px; }
    .del-btn:hover { border-color: var(--danger); }
    .muted { color: var(--muted); }
    .empty { color: var(--muted); padding: 14px 0; text-align: center; }
    .row-right { display: flex; gap: 6px; justify-content: flex-end; }
    .filter-bar { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; padding: 6px 0 10px; color: var(--muted); font-size: 13px; }
    .filter-bar b { color: var(--ink); font-weight: 600; }
    .del-btn.view { color: var(--accent-text); }
    #toast { position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%); z-index: 80; }
    @media (max-width: 640px) { .hide-sm { display: none; } }
  </style>
</head>
<body>
  <div class="adm">
    <div class="adm-head">
      <h1>后台管理 · 对话记录</h1>
      <button class="ic" id="refreshBtn" title="刷新"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-2.64-6.36"/><path d="M21 3v5h-5"/></svg></button>
      <a class="ic" href="index.html" title="返回写作"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg> 返回</a>
    </div>

    <div class="adm-card">
      <h2>用户</h2>
      <div id="usersBox"><div class="empty">加载中…</div></div>
    </div>

    <div class="adm-card">
      <h2>对话记录（按占用倒序，大的在上便于清理）</h2>
      <div id="convBox"><div class="empty">加载中…</div></div>
    </div>
  </div>

  <div id="toast"></div>

  <script>
    const TOKEN = localStorage.getItem("token") || "";
    if (!TOKEN) location.href = "index.html";
    if (localStorage.getItem("theme")) document.documentElement.dataset.theme = localStorage.getItem("theme");

    async function api(path, opts = {}) {
      const res = await fetch(path, {
        method: opts.method || "GET",
        headers: { "Content-Type": "application/json", "Authorization": "Bearer " + TOKEN },
        body: opts.body ? JSON.stringify(opts.body) : undefined,
      });
      if (res.status === 401) { location.href = "index.html"; throw new Error("未登录"); }
      if (res.status === 403) { throw new Error("非管理员"); }
      if (!res.ok) throw new Error((await res.text()) || res.statusText);
      return res.json();
    }

    function esc(s) { return (s == null ? "" : String(s)).replace(/[&<>"]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c])); }
    function fmtTime(t) { return t ? new Date(t * 1000).toLocaleString("zh-CN") : "—"; }
    let toastT = null;
    function showToast(msg, type) {
      const el = document.getElementById("toast");
      el.innerHTML = `<div class="toast ${type || ""}">${esc(msg)}</div>`;
      clearTimeout(toastT);
      toastT = setTimeout(() => { el.innerHTML = ""; }, 2400);
    }

    let USERS = [], CONVS = [], CONV_FILTER = null;

    async function loadAll() {
      try {
        const [u, c] = await Promise.all([api("/api/admin/users"), api("/api/admin/conversations")]);
        USERS = u.users || []; CONVS = c.conversations || [];
        renderUsers(); renderConvs();
      } catch (e) {
        if (e.message === "非管理员") {
          document.querySelector(".adm").innerHTML = '<div class="empty">当前账号不是管理员，<a href="index.html">返回写作</a>。</div>';
        } else {
          showToast(e.message, "err");
        }
      }
    }

    function fmtBytes(n) {
      n = n || 0;
      if (n < 1024) return n + " B";
      if (n < 1024 * 1024) return (n / 1024).toFixed(1) + " KB";
      return (n / 1024 / 1024).toFixed(1) + " MB";
    }
    function userName(uid) { const u = USERS.find(x => x.id === uid); return u ? u.username : ("#" + uid); }

    function renderUsers() {
      const box = document.getElementById("usersBox");
      if (!USERS.length) { box.innerHTML = '<div class="empty">暂无用户</div>'; return; }
      box.innerHTML = `<table class="adm-tbl"><thead><tr>
        <th>ID</th><th>用户名</th><th>角色</th><th class="hide-sm">作品</th><th class="hide-sm">章节</th><th>对话数</th><th>对话占用</th><th class="hide-sm">注册时间</th><th>操作</th>
      </tr></thead><tbody>` + USERS.map(u => {
        const acts = [];
        if (u.convs) acts.push(`<button class="del-btn view" onclick="viewUserConv(${u.id})">查看对话</button>`,
                                `<button class="del-btn" onclick="clearUser(${u.id})">清空对话</button>`);
        if (!u.is_admin) acts.push(`<button class="del-btn" onclick="delUser(${u.id})">删除账号</button>`);
        return `<tr>
          <td>${u.id}</td><td>${esc(u.username)}</td>
          <td>${u.is_admin ? '<span class="tag adm-tag">管理员</span>' : '<span class="tag">普通</span>'}</td>
          <td class="hide-sm">${u.works || 0}</td><td class="hide-sm">${u.chapters || 0}</td>
          <td>${u.convs || 0}</td><td>${fmtBytes(u.conv_bytes)}</td>
          <td class="hide-sm">${fmtTime(u.created_at)}</td>
          <td>${acts.length ? acts.join(" ") : '<span class="muted">—</span>'}</td>
        </tr>`;
      }).join("") + "</tbody></table>";
    }

    function renderConvs() {
      const box = document.getElementById("convBox");
      const list = CONV_FILTER == null ? CONVS : CONVS.filter(x => x.user_id === CONV_FILTER);
      let head = "";
      if (CONV_FILTER != null) {
        head = `<div class="filter-bar">仅显示 <b>${esc(userName(CONV_FILTER))}</b> 的对话`
          + ` <button class="del-btn view" onclick="clearConvFilter()">显示全部</button></div>`;
      }
      if (!list.length) { box.innerHTML = head + '<div class="empty">暂无对话记录</div>'; return; }
      // 按占用字节倒序，最大的在最上方便于清理
      const sorted = list.slice().sort((a, b) => (b.bytes || 0) - (a.bytes || 0));
      box.innerHTML = head + `<table class="adm-tbl"><thead><tr>
        <th>用户</th><th>章节</th><th>占用</th><th class="hide-sm">消息数</th><th class="hide-sm">摘要</th><th class="hide-sm">更新时间</th><th>操作</th>
      </tr></thead><tbody>` + sorted.map(c => {
        const chap = c.chapter_id == null ? '<span class="muted">（无章节）</span>'
          : (c.chapter_title ? esc(c.chapter_title) : '<span class="muted">（已删除）</span>');
        return `<tr>
          <td>${esc(c.username || ("#" + c.user_id))}</td>
          <td>${chap}</td>
          <td>${fmtBytes(c.bytes)}</td>
          <td class="hide-sm">${c.msg_count || 0}</td>
          <td class="hide-sm">${c.has_summary ? '<span class="tag on">有</span>' : '<span class="muted">无</span>'}</td>
          <td class="hide-sm">${fmtTime(c.updated_at)}</td>
          <td><button class="del-btn" onclick="delConv(${c.id})">删除</button></td>
        </tr>`;
      }).join("") + "</tbody></table>";
    }

    async function delConv(id) {
      if (!confirm("删除这条对话记录？不可恢复。")) return;
      try { await api(`/api/admin/conversations/${id}`, { method: "DELETE" }); showToast("已删除", "ok"); await loadAll(); }
      catch (e) { showToast("删除失败：" + e.message, "err"); }
    }
    async function clearUser(uid) {
      const name = userName(uid);
      if (!confirm(`清空用户「${name}」的全部对话记录？不可恢复。`)) return;
      try { const r = await api(`/api/admin/users/${uid}/conversations`, { method: "DELETE" }); showToast(`已清空 ${r.deleted} 条`, "ok"); await loadAll(); }
      catch (e) { showToast("清空失败：" + e.message, "err"); }
    }
    async function delUser(uid) {
      const name = userName(uid);
      if (!confirm(`彻底删除用户「${name}」？将一并清除其全部作品/章节/段落/版本/实体/对话/设置，不可恢复。`)) return;
      try { await api(`/api/admin/users/${uid}`, { method: "DELETE" }); showToast(`已删除用户「${name}」`, "ok"); if (CONV_FILTER === uid) CONV_FILTER = null; await loadAll(); }
      catch (e) { showToast("删除失败：" + e.message, "err"); }
    }
    function viewUserConv(uid) {
      CONV_FILTER = uid;
      renderConvs();
      document.getElementById("convBox").scrollIntoView({ behavior: "smooth", block: "start" });
    }
    function clearConvFilter() { CONV_FILTER = null; renderConvs(); }

    document.getElementById("refreshBtn").onclick = loadAll;
    loadAll();
  </script>
</body>
</html>
